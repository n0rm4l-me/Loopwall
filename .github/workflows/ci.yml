name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make app

      - name: Zip app bundle
        run: zip -r Loopwall.app.zip Loopwall.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Loopwall.app
          path: Loopwall.app.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Loopwall.app.zip
